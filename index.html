<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ahsen Emir Nişan Anıları</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-rose-50 text-gray-800">

  <div class="max-w-3xl mx-auto py-10 px-4 text-center">
    <h1 class="text-3xl font-bold mb-2">Ahsen Emir Nişan Anıları</h1>
    <p class="mb-6 text-gray-600">Fotoğraflarınızı yükleyin 💕</p>

    <input id="name" type="text" placeholder="Ad Soyad"
      class="border p-2 w-full mb-4 rounded" />

    <input id="file" type="file" multiple
      class="mb-4" />

    <button onclick="upload()"
      class="bg-rose-400 text-white px-6 py-2 rounded">
      Yükle
    </button>

    <div id="gallery" class="grid grid-cols-2 gap-4 mt-8"></div>
  </div>

  <script>
    function upload() {
      const name = document.getElementById("name").value;
      const files = document.getElementById("file").files;

      if (!name || files.length === 0) {
        alert("İsim ve fotoğraf ekleyin");
        return;
      }

      for (let file of files) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const gallery = document.getElementById("gallery");

          const div = document.createElement("div");
          div.innerHTML = `
            <img src="${e.target.result}" class="rounded shadow">
            <p class="text-sm mt-1">${name}</p>
          `;

          gallery.appendChild(div);
        };
        reader.readAsDataURL(file);
      }
    }
  </script>

</body>
</html>
