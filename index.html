<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ahsen Emir Nişan Anıları</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-rose-50 text-gray-800 min-h-screen">

  <!-- Şifre Ekranı -->
  <div id="passwordGate" class="fixed inset-0 z-[100] bg-rose-50 flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-6 text-center">
      <h1 class="text-2xl font-bold mb-2">Ahsen Emir Nişan Anıları</h1>
      <p class="text-gray-600 mb-5">Devam etmek için şifreyi girin</p>

      <input
        id="passwordInput"
        type="password"
        placeholder="Şifre"
        class="border p-3 w-full rounded-lg mb-4"
      />

      <button
        id="passwordBtn"
        class="w-full bg-rose-400 hover:bg-rose-500 text-white py-3 rounded-lg"
      >
        Giriş Yap
      </button>

      <p id="passwordError" class="text-red-500 text-sm mt-3 hidden">Şifre yanlış.</p>
    </div>
  </div>

  <div id="appContent" class="hidden">
    <div class="max-w-6xl mx-auto py-10 px-4">
      <div class="text-center mb-8">
        <h1 class="text-3xl md:text-4xl font-bold mb-2">Ahsen Emir Nişan Anıları</h1>
        <p class="text-gray-600">Fotoğraflarınızı yükleyin 💕</p>
      </div>

      <div class="bg-white rounded-2xl shadow p-6 mb-8">
        <input
          id="name"
          type="text"
          placeholder="Ad Soyad"
          class="border p-3 w-full mb-4 rounded-lg"
        />

        <input
          id="file"
          type="file"
          accept="image/*"
          multiple
          class="border p-3 w-full mb-4 rounded-lg bg-white"
        />

        <div class="flex flex-col sm:flex-row gap-3">
          <button
            id="uploadBtn"
            class="bg-rose-400 hover:bg-rose-500 text-white px-6 py-3 rounded-lg"
          >
            Yükle
          </button>

          <button
            id="downloadSelectedBtn"
            class="bg-gray-800 hover:bg-black text-white px-6 py-3 rounded-lg"
          >
            Seçilenleri İndir
          </button>
        </div>

        <p id="status" class="text-sm mt-3 text-gray-600"></p>
      </div>

      <div>
        <div class="flex items-center justify-between gap-4 mb-4">
          <h2 class="text-2xl font-semibold">Galeri</h2>
          <p id="selectedCount" class="text-sm text-gray-600">0 fotoğraf seçildi</p>
        </div>

        <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4"></div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div
    id="imageModal"
    class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 p-4"
  >
    <div class="relative max-w-5xl w-full">
      <button
        id="closeModal"
        class="absolute top-3 right-3 bg-white text-black rounded-full w-10 h-10 text-lg shadow z-10"
      >
        ✕
      </button>

      <div class="bg-white rounded-2xl overflow-hidden shadow-2xl">
        <img
          id="modalImage"
          src=""
          alt="Büyük fotoğraf"
          class="w-full max-h-[75vh] object-contain bg-black"
        />

        <div class="p-4 flex flex-col sm:flex-row gap-3 sm:items-center sm:justify-between">
          <div>
            <p id="modalName" class="font-semibold"></p>
            <p id="modalDate" class="text-sm text-gray-500"></p>
          </div>

          <a
            id="downloadBtn"
            href="#"
            download
            target="_blank"
            class="inline-block bg-rose-400 hover:bg-rose-500 text-white px-5 py-2 rounded-lg text-center"
          >
            İndir
          </a>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabaseUrl = "https://sprthcaxikqrykkzmcmI.supabase.co";
    const supabaseKey = "sb_publishable_cTie7htJ873Fm1-055CUZg_GjYAdr2V";
    const sb = createClient(supabaseUrl, supabaseKey);

    const SITE_PASSWORD = "ahsenemir19";

    const passwordGate = document.getElementById("passwordGate");
    const appContent = document.getElementById("appContent");
    const passwordInput = document.getElementById("passwordInput");
    const passwordBtn = document.getElementById("passwordBtn");
    const passwordError = document.getElementById("passwordError");

    const nameInput = document.getElementById("name");
    const fileInput = document.getElementById("file");
    const uploadBtn = document.getElementById("uploadBtn");
    const downloadSelectedBtn = document.getElementById("downloadSelectedBtn");
    const statusEl = document.getElementById("status");
    const gallery = document.getElementById("gallery");
    const selectedCount = document.getElementById("selectedCount");

    const imageModal = document.getElementById("imageModal");
    const modalImage = document.getElementById("modalImage");
    const modalName = document.getElementById("modalName");
    const modalDate = document.getElementById("modalDate");
    const downloadBtn = document.getElementById("downloadBtn");
    const closeModal = document.getElementById("closeModal");

    let selectedImages = [];

    function setStatus(text, type = "normal") {
      statusEl.textContent = text;
      statusEl.className = "text-sm mt-3";
      if (type === "error") statusEl.classList.add("text-red-500");
      else if (type === "success") statusEl.classList.add("text-green-600");
      else statusEl.classList.add("text-gray-600");
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function updateSelectedCount() {
      selectedCount.textContent = `${selectedImages.length} fotoğraf seçildi`;
    }

    function toggleSelect(imageUrl, checked) {
      if (checked) {
        if (!selectedImages.includes(imageUrl)) {
          selectedImages.push(imageUrl);
        }
      } else {
        selectedImages = selectedImages.filter((url) => url !== imageUrl);
      }
      updateSelectedCount();
    }

    function openModal(imageUrl, uploaderName, createdAt) {
      modalImage.src = imageUrl;
      modalName.textContent = uploaderName || "İsimsiz";
      modalDate.textContent = new Date(createdAt).toLocaleString("tr-TR");
      downloadBtn.href = imageUrl;
      imageModal.classList.remove("hidden");
      imageModal.classList.add("flex");
      document.body.classList.add("overflow-hidden");
    }

    function closeModalFn() {
      imageModal.classList.add("hidden");
      imageModal.classList.remove("flex");
      modalImage.src = "";
      document.body.classList.remove("overflow-hidden");
    }

    async function loadGallery() {
      gallery.innerHTML = "<p class='text-gray-500'>Yükleniyor...</p>";

      const { data, error } = await sb
        .from("photos")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        console.error("Galeri yükleme hatası:", error);
        gallery.innerHTML = `<p class="text-red-500">Galeri yüklenemedi: ${error.message}</p>`;
        return;
      }

      if (!data || data.length === 0) {
        gallery.innerHTML = "<p class='text-gray-500'>Henüz fotoğraf yüklenmedi.</p>";
        return;
      }

      gallery.innerHTML = data.map((item) => {
        const checked = selectedImages.includes(item.image_url) ? "checked" : "";
        const safeName = escapeHtml(item.uploader_name || "İsimsiz");
        const safeDate = new Date(item.created_at).toLocaleString("tr-TR");

        return `
          <div class="bg-white rounded-2xl shadow overflow-hidden">
            <div class="relative">
              <label class="absolute top-3 left-3 z-10 bg-white/90 rounded-full w-8 h-8 flex items-center justify-center shadow cursor-pointer">
                <input
                  type="checkbox"
                  class="photo-checkbox w-4 h-4 accent-rose-500"
                  data-url="${item.image_url}"
                  ${checked}
                />
              </label>

              <img
                src="${item.image_url}"
                alt="Fotoğraf"
                class="w-full h-64 object-cover cursor-pointer gallery-image"
                data-url="${item.image_url}"
                data-name="${safeName}"
                data-date="${item.created_at}"
              />
            </div>

            <div class="p-4">
              <p class="font-medium">${safeName}</p>
              <p class="text-xs text-gray-500 mt-1">${safeDate}</p>
            </div>
          </div>
        `;
      }).join("");

      document.querySelectorAll(".gallery-image").forEach((img) => {
        img.addEventListener("click", () => {
          openModal(
            img.dataset.url,
            img.dataset.name,
            img.dataset.date
          );
        });
      });

      document.querySelectorAll(".photo-checkbox").forEach((checkbox) => {
        checkbox.addEventListener("change", (e) => {
          toggleSelect(e.target.dataset.url, e.target.checked);
        });
      });
    }

    async function uploadFiles() {
      const name = nameInput.value.trim();
      const files = fileInput.files;

      if (!name) {
        setStatus("Lütfen ad soyad girin.", "error");
        return;
      }

      if (!files.length) {
        setStatus("Lütfen en az bir fotoğraf seçin.", "error");
        return;
      }

      uploadBtn.disabled = true;
      uploadBtn.classList.add("opacity-60", "cursor-not-allowed");
      setStatus("Fotoğraflar yükleniyor...");

      try {
        for (const file of files) {
          if (!file.type.startsWith("image/")) {
            throw new Error("Sadece görsel dosyaları yükleyebilirsiniz.");
          }

          if (file.size > 10 * 1024 * 1024) {
            throw new Error(`${file.name} 10 MB sınırını aşıyor.`);
          }

          const ext = file.name.split(".").pop();
          const fileName = `${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
          const filePath = `uploads/${fileName}`;

          const { error: uploadError } = await sb.storage
            .from("photos")
            .upload(filePath, file);

          if (uploadError) throw uploadError;

          const { data: publicUrlData } = sb.storage
            .from("photos")
            .getPublicUrl(filePath);

          const imageUrl = publicUrlData.publicUrl;

          const { error: insertError } = await sb
            .from("photos")
            .insert({
              uploader_name: name,
              image_url: imageUrl
            });

          if (insertError) throw insertError;
        }

        setStatus("Fotoğraflar başarıyla yüklendi.", "success");
        fileInput.value = "";
        await loadGallery();
      } catch (error) {
        console.error("Upload hatası:", error);
        setStatus("Hata: " + error.message, "error");
      } finally {
        uploadBtn.disabled = false;
        uploadBtn.classList.remove("opacity-60", "cursor-not-allowed");
      }
    }

    async function downloadFile(url, index) {
      try {
        const response = await fetch(url);
        const blob = await response.blob();
        const blobUrl = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = blobUrl;
        a.download = `ahsen-emir-${index + 1}.jpg`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(blobUrl);
      } catch (error) {
        console.error("İndirme hatası:", error);
      }
    }

    async function downloadSelected() {
      if (selectedImages.length === 0) {
        setStatus("Lütfen önce en az bir fotoğraf seçin.", "error");
        return;
      }

      setStatus("Seçilen fotoğraflar indiriliyor...");

      for (let i = 0; i < selectedImages.length; i++) {
        await downloadFile(selectedImages[i], i);
        await new Promise((resolve) => setTimeout(resolve, 500));
      }

      setStatus("Seçilen fotoğraflar indirildi.", "success");
    }

    function unlockSite() {
      const value = passwordInput.value.trim();
      if (value === SITE_PASSWORD) {
        sessionStorage.setItem("site_access", "granted");
        passwordGate.classList.add("hidden");
        appContent.classList.remove("hidden");
        loadGallery();
      } else {
        passwordError.classList.remove("hidden");
      }
    }

    passwordBtn.addEventListener("click", unlockSite);
    passwordInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") unlockSite();
    });

    uploadBtn.addEventListener("click", uploadFiles);
    downloadSelectedBtn.addEventListener("click", downloadSelected);

    closeModal.addEventListener("click", closeModalFn);

    imageModal.addEventListener("click", (e) => {
      if (e.target === imageModal) closeModalFn();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeModalFn();
    });

    if (sessionStorage.getItem("site_access") === "granted") {
      passwordGate.classList.add("hidden");
      appContent.classList.remove("hidden");
      loadGallery();
    }
  </script>
</body>
</html>
